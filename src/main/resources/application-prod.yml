# 1. PHẦN BỔ SUNG ĐỂ CHẠY TRÊN RAILWAY (FIX LỖI SWAGGER/HTTPS)
server:
  port: 8080
  forward-headers-strategy: framework # Giúp Spring Boot hiểu là đang chạy HTTPS qua Proxy của Railway

# 2. PHẦN CẤU HÌNH DATABASE CỦA BẠN
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

# 3. PHẦN CẤU HÌNH LOGGING
logging:
  level:
    root: WARN
    com.vinh.financetracker: INFO
    org.springframework: WARN
    org.hibernate: WARN

# 4. CẤU HÌNH SWAGGER (FIX LỖI PETSTORE)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    display-request-duration: true