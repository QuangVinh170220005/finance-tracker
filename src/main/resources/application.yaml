spring:
  application:
    name: finance-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/finance_tracker
    username: postgres
    password: "123456"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
springdoc:
   swagger-ui:
     path: /swagger-ui.html
