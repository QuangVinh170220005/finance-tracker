name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubunut-latest
    steps:
      -uses: actions/checkout@v3
      -name: Set up JDK 21
      uses: acttion/setup-java@v3
      with:
        java-version: '21'
        distribiion: temurin
        -name: Built wih Maven
        run: mvn -B package --file pom.xml